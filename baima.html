<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>绍宋 · 战役推演</title>
  <style>
:root {
  --bg: #1a1612;
  --panel: #252018;
  --border: #4a3f32;
  --song: #c45c26;
  --song-dim: rgba(196, 92, 38, 0.35);
  --jin: #3d6b8a;
  --jin-dim: rgba(61, 107, 138, 0.4);
  --gold: #d4a84b;
  --text: #e8dcc8;
  --muted: #9a8b76;
  --accent: #8b4513;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: "PingFang SC", "Microsoft YaHei", "Noto Serif SC", "STSong", serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  background-image:
    radial-gradient(ellipse 80% 50% at 50% 0%, rgba(212, 168, 75, 0.08), transparent),
    linear-gradient(180deg, #1a1612 0%, #12100d 100%);
}
header {
  padding: 1rem 1.5rem;
  border-bottom: 1px solid var(--border);
}
header .top-row {
  display: flex;
  flex-wrap: wrap;
  align-items: baseline;
  gap: 0.75rem 1.5rem;
  margin-bottom: 0.5rem;
}
header h1 {
      font-family: "STKaiti", "KaiTi", "PingFang SC", serif;
  font-size: 1.75rem;
  font-weight: 400;
  color: var(--gold);
  letter-spacing: 0.15em;
}
header .sub { color: var(--muted); font-size: 0.9rem; }
.battle-nav {
  display: flex;
  flex-wrap: wrap;
  gap: 6px 10px;
  font-size: 0.8rem;
}
.battle-nav a {
  color: var(--muted);
  text-decoration: none;
  padding: 4px 10px;
  border: 1px solid var(--border);
  border-radius: 4px;
}
.battle-nav a:hover { color: var(--gold); border-color: var(--gold); }
.battle-nav a.active { color: var(--gold); background: rgba(212, 168, 75, 0.12); border-color: var(--gold); }
.layout {
  display: grid;
  grid-template-columns: 1fr 340px;
  grid-template-rows: auto 1fr;
  gap: 0;
  height: calc(100vh - 100px);
}
@media (max-width: 960px) {
  .layout { grid-template-columns: 1fr; grid-template-rows: auto 50vh auto; height: auto; min-height: calc(100vh - 100px); }
}
.map-wrap {
  position: relative;
  background: #14110e;
  border-right: 1px solid var(--border);
  overflow: hidden;
}
.anim-progress {
  position: absolute;
  top: 0;
  left: 0;
  height: 3px;
  width: 0;
  background: linear-gradient(90deg, var(--gold), var(--song));
  transition: width 0.05s linear;
  z-index: 5;
  pointer-events: none;
}
.controls button.film {
  background: #5a3d1a;
  border-color: var(--gold);
}
#map { display: block; width: 100%; height: 100%; cursor: crosshair; }
.map-legend {
  position: absolute;
  bottom: 12px;
  left: 12px;
  background: rgba(37, 32, 24, 0.92);
  border: 1px solid var(--border);
  padding: 10px 14px;
  font-size: 0.75rem;
  border-radius: 4px;
  line-height: 1.6;
}
.map-legend span {
  display: inline-block;
  width: 12px;
  height: 12px;
  margin-right: 6px;
  vertical-align: middle;
  border-radius: 2px;
}
.sidebar {
  display: flex;
  flex-direction: column;
  background: var(--panel);
  border-left: 1px solid var(--border);
  overflow: hidden;
}
@media (max-width: 960px) {
  .sidebar { border-left: none; border-top: 1px solid var(--border); max-height: 50vh; }
}
.phase-nav { padding: 12px 14px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.phase-nav label { font-size: 0.75rem; color: var(--muted); display: block; margin-bottom: 6px; }
.phase-slider { width: 100%; accent-color: var(--gold); }
.phase-meta { display: flex; justify-content: space-between; margin-top: 8px; font-size: 0.8rem; }
.phase-meta strong { color: var(--gold); }
.controls { display: flex; gap: 8px; margin-top: 10px; }
.controls button {
  flex: 1;
  padding: 8px;
  font-family: inherit;
  font-size: 0.85rem;
  background: var(--accent);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 4px;
  cursor: pointer;
}
.controls button:hover { filter: brightness(1.15); }
.controls button.primary { background: #6b4423; border-color: var(--gold); }
.content { flex: 1; overflow-y: auto; padding: 14px 16px; }
.phase-title { font-size: 1.15rem; color: var(--gold); margin-bottom: 8px; font-family: "STKaiti", "KaiTi", serif; }
.phase-time { font-size: 0.8rem; color: var(--muted); margin-bottom: 12px; }
.narrative { font-size: 0.92rem; line-height: 1.75; margin-bottom: 14px; text-align: justify; }
.tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
.tag { font-size: 0.72rem; padding: 3px 8px; border-radius: 3px; border: 1px solid var(--border); }
.tag.song { background: var(--song-dim); color: #f0a070; }
.tag.jin { background: var(--jin-dim); color: #8ec4e0; }
.tag.turn { border-color: var(--gold); color: var(--gold); }
.tag.xi { background: rgba(120, 90, 160, 0.35); color: #c9b0e8; }
.tag.politics { background: rgba(212, 168, 75, 0.15); color: var(--gold); border-color: var(--gold); }
.tag.naval { background: rgba(58, 106, 136, 0.35); color: #8ec4e0; }
.figures { border-top: 1px solid var(--border); padding-top: 12px; }
.figures h4 { font-size: 0.8rem; color: var(--muted); margin-bottom: 8px; font-weight: 400; }
.figure-list { font-size: 0.82rem; line-height: 1.6; color: var(--muted); }
.figure-list b { color: var(--text); font-weight: 600; }
.toolbar {
  grid-column: 1 / -1;
  display: flex;
  flex-wrap: wrap;
  gap: 8px 16px;
  padding: 10px 16px;
  border-top: 1px solid var(--border);
  background: var(--panel);
  font-size: 0.8rem;
  align-items: center;
}
.toolbar label { display: flex; align-items: center; gap: 6px; color: var(--muted); cursor: pointer; }
.toolbar input { accent-color: var(--gold); }
.disclaimer {
  padding: 8px 16px 12px;
  font-size: 0.72rem;
  color: var(--muted);
  border-top: 1px solid var(--border);
  line-height: 1.5;
}
.tooltip {
  position: fixed;
  pointer-events: none;
  background: rgba(20, 17, 14, 0.95);
  border: 1px solid var(--gold);
  padding: 8px 12px;
  font-size: 0.8rem;
  max-width: 220px;
  border-radius: 4px;
  z-index: 100;
  display: none;
}

  </style>
</head>

/**
 * 绍宋战役沙盘 — 通用引擎（含阶段过渡动画）
 */
(function () {
  const cfg = window.BATTLE_CONFIG;
  if (!cfg || !cfg.phases?.length) {
    console.error("BATTLE_CONFIG.phases required");
    return;
  }

  document.title = cfg.pageTitle || "绍宋 · 战役推演";
  const h1 = document.getElementById("hdrTitle");
  if (h1 && cfg.headerTitle) h1.textContent = cfg.headerTitle;
  const disc = document.getElementById("disclaimer");
  if (disc && cfg.disclaimer) disc.textContent = cfg.disclaimer;

  const phases = cfg.phases;
  const terrain = cfg.terrain || [];
  const animDuration = cfg.animDuration ?? 1600;
  const holdDuration = cfg.holdDuration ?? 2800;

  let phase = 0;
  let playing = false;
  let playTimer = null;
  let filmMode = false;
  let displayUnits = [];
  let displayArrows = [];
  let rafId = null;

  const canvas = document.getElementById("map");
  const ctx = canvas.getContext("2d");
  const tooltip = document.getElementById("tooltip");
  const slider = document.getElementById("phaseSlider");
  const progressBar = document.getElementById("animProgress");

  slider.min = 0;
  slider.max = phases.length - 1;

  function easeInOut(t) {
    return t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
  }

  function cloneUnits(units) {
    return (units || []).map((u) => ({ ...u }));
  }

  function unitKey(u) {
    return u.id || u.label || `${u.x}-${u.y}`;
  }

  function lerpUnits(from, to, t) {
    const mf = new Map(from.map((u) => [unitKey(u), u]));
    const mt = new Map(to.map((u) => [unitKey(u), u]));
    const keys = new Set([...mf.keys(), ...mt.keys()]);
    const out = [];
    keys.forEach((k) => {
      const a = mf.get(k);
      const b = mt.get(k);
      if (a && b) {
        const dx = b.x - a.x;
        const dy = b.y - a.y;
        out.push({
          ...b,
          x: a.x + dx * t,
          y: a.y + dy * t,
          alpha: 1,
          scale: 1 + 0.18 * Math.sin(t * Math.PI),
          marchDx: dx,
          marchDy: dy,
        });
      } else if (a) out.push({ ...a, alpha: 1 - t });
      else out.push({ ...b, alpha: t });
    });
    return out.filter((u) => (u.alpha ?? 1) > 0.04);
  }

  function lerpArrows(from, to, t) {
    const out = [];
    const max = Math.max((from || []).length, (to || []).length);
    for (let i = 0; i < max; i++) {
      const a = from?.[i];
      const b = to?.[i];
      if (a && b) {
        out.push({
          from: [
            a.from[0] + (b.from[0] - a.from[0]) * t,
            a.from[1] + (b.from[1] - a.from[1]) * t,
          ],
          to: [
            a.to[0] + (b.to[0] - a.to[0]) * t,
            a.to[1] + (b.to[1] - a.to[1]) * t,
          ],
          side: b.side,
          dash: b.dash,
          alpha: 1,
        });
      } else if (a) out.push({ ...a, alpha: 1 - t });
      else if (b) out.push({ ...b, alpha: t });
    }
    return out.filter((a) => a.alpha > 0.04);
  }

  function drawMarchGhost(u, w, h) {
    if (u.marchDx == null) return;
    const x0 = (u.x - u.marchDx * 0.35) * w;
    const y0 = (u.y - u.marchDy * 0.35) * h;
    const x1 = u.x * w;
    const y1 = u.y * h;
    ctx.save();
    ctx.globalAlpha = 0.35;
    ctx.strokeStyle = u.side === "jin" ? "#6eb5d8" : "#e89550";
    ctx.lineWidth = 1.5;
    ctx.setLineDash([4, 4]);
    ctx.beginPath();
    ctx.moveTo(x0, y0);
    ctx.lineTo(x1, y1);
    ctx.stroke();
    ctx.restore();
  }

  function cancelAnim() {
    transitionToken = null;
    if (rafId) cancelAnimationFrame(rafId);
    rafId = null;
    if (progressBar) progressBar.style.width = "0%";
  }

  let transitionToken = null;

  function animEnabled() {
    const el = document.getElementById("enableAnim");
    return !el || el.checked;
  }

  function getOpts() {
    return {
      labels: document.getElementById("showLabels").checked,
      units: document.getElementById("showUnits").checked,
      arrows: document.getElementById("showArrows").checked,
      emperor: document.getElementById("highlightEmperor").checked,
    };
  }

  function fillPoly(pts, fillStyle) {
    if (!pts.length) return;
    ctx.fillStyle = fillStyle;
    ctx.beginPath();
    ctx.moveTo(pts[0][0], pts[0][1]);
    for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i][0], pts[i][1]);
    ctx.closePath();
    ctx.fill();
  }

  function strokePoly(pts, strokeStyle, lineWidth) {
    if (!pts.length) return;
    ctx.strokeStyle = strokeStyle;
    ctx.lineWidth = lineWidth;
    ctx.beginPath();
    ctx.moveTo(pts[0][0], pts[0][1]);
    for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i][0], pts[i][1]);
    ctx.closePath();
    ctx.stroke();
  }

  function fillPolyGrad(pts, x0, y0, x1, y1, c0, c1) {
    const g = ctx.createLinearGradient(x0, y0, x1, y1);
    g.addColorStop(0, c0);
    g.addColorStop(1, c1);
    fillPoly(pts, g);
  }

  function drawRidgeContours(w, h, ridges) {
    ctx.save();
    ctx.globalAlpha = 0.22;
    ridges.forEach((r) => {
      ctx.strokeStyle = r.color || "#1a1510";
      ctx.lineWidth = r.w || 1;
      ctx.beginPath();
      r.pts.forEach((p, i) => {
        const x = p[0] * w;
        const y = p[1] * h;
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      });
      ctx.stroke();
    });
    ctx.restore();
  }

  function drawRiverPath(pts, w, h, opts) {
    const scale = opts.width || 0.028;
    const baseW = Math.max(w, h) * scale;
    ctx.save();
    ctx.lineCap = "round";
    ctx.lineJoin = "round";
    for (let pass = 0; pass < 3; pass++) {
      const t = pass / 2;
      ctx.strokeStyle = pass === 0 ? opts.bank || "#3d4a32" : pass === 1 ? opts.mid || "#2a5a6e" : opts.water || "#3d7a94";
      ctx.lineWidth = baseW * (2.4 - t * 0.7);
      ctx.globalAlpha = pass === 2 ? 0.75 + 0.08 * Math.sin(Date.now() / 900 + opts.phase || 0) : 0.95;
      ctx.beginPath();
      pts.forEach((p, i) => {
        const x = p[0] * w;
        const y = p[1] * h;
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      });
      ctx.stroke();
    }
    ctx.restore();
  }

  function drawMarshPatch(x, y, rw, rh) {
    ctx.save();
    const g = ctx.createRadialGradient(x, y, 0, x, y, Math.max(rw, rh));
    g.addColorStop(0, "rgba(55, 72, 58, 0.55)");
    g.addColorStop(0.6, "rgba(38, 52, 44, 0.75)");
    g.addColorStop(1, "rgba(28, 38, 32, 0)");
    ctx.fillStyle = g;
    ctx.fillRect(x - rw, y - rh, rw * 2, rh * 2);
    ctx.globalAlpha = 0.35;
    ctx.fillStyle = "#4a6a58";
    for (let i = 0; i < 12; i++) {
      const dx = (i % 4 - 1.5) * (rw * 0.35);
      const dy = (Math.floor(i / 4) - 1) * (rh * 0.35);
      ctx.beginPath();
      ctx.ellipse(x + dx, y + dy, rw * 0.12, rh * 0.08, 0, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }

  function drawMountain(cx, cy, size, opts) {
    const s = size * (opts.scale || 1);
    const layers = opts.layers || 3;
    ctx.save();
    for (let i = layers - 1; i >= 0; i--) {
      const t = i / (layers - 1 || 1);
      const wob = 0.72 + t * 0.28;
      const peak = cy - s * (0.85 + t * 0.12);
      const pts = [
        [cx - s * wob, cy + s * 0.2],
        [cx - s * 0.15, peak + s * 0.08],
        [cx, peak],
        [cx + s * 0.18, peak + s * 0.1],
        [cx + s * wob, cy + s * 0.22],
      ];
      const light = opts.light || "#6b5a48";
      const shadow = opts.shadow || "#2e2620";
      fillPolyGrad(pts, cx - s, peak, cx + s, cy + s, light, shadow);
      strokePoly(pts, "rgba(0,0,0,0.25)", 1);
    }
    if (opts.snow) {
      ctx.fillStyle = "rgba(220, 228, 235, 0.35)";
      ctx.beginPath();
      ctx.moveTo(cx - s * 0.12, cy - s * 0.55);
      ctx.lineTo(cx, cy - s * 0.82);
      ctx.lineTo(cx + s * 0.14, cy - s * 0.5);
      ctx.closePath();
      ctx.fill();
    }
    ctx.restore();
  }

  function terrainKind(name) {
    if (/平地/.test(name)) return "plain";
    if (/水|河|渡|谷/.test(name)) return "water";
    if (/淖|洼|泥/.test(name)) return "marsh";
    if (/山|塬|寨|岭/.test(name)) return "mountain";
    if (/大寨|御营/.test(name)) return "place";
    return "place";
  }

  function drawTerrainLandmarks(w, h) {
    terrain.forEach((t) => {
      const kind = t.kind || terrainKind(t.name || "");
      const x = t.x * w;
      const y = t.y * h;
      const label = t.name || "";
      if (kind === "mountain") {
        const big = /尧山|五龙|东坡|塬/.test(label);
        drawMountain(x, y + h * 0.04, big ? h * 0.11 : h * 0.065, {
          scale: big ? 1.15 : 0.9,
          snow: /尧山|五龙/.test(label),
          light: big ? "#7a6a52" : "#5c5042",
          shadow: "#2a221c",
        });
      } else if (kind === "water") {
        const seg = [
          [t.x - 0.06, t.y],
          [t.x, t.y + 0.02],
          [t.x + 0.08, t.y - 0.01],
        ];
        drawRiverPath(seg, w, h, { width: 0.022, phase: t.x * 10 });
      } else if (kind === "marsh") {
        drawMarshPatch(x, y, w * 0.09, h * 0.06);
      }
    });
  }

  function drawYaoshanTerrain(w, h) {
    const sky = ctx.createLinearGradient(0, 0, 0, h);
    sky.addColorStop(0, "#1c1814");
    sky.addColorStop(0.45, "#242018");
    sky.addColorStop(1, "#1a1612");
    ctx.fillStyle = sky;
    ctx.fillRect(0, 0, w, h);

    fillPolyGrad(
      [
        [0, h * 0.38],
        [w * 0.44, h * 0.22],
        [w * 0.48, h * 0.58],
        [w * 0.12, h * 0.62],
        [0, h * 0.55],
      ],
      0,
      h * 0.2,
      w * 0.5,
      h * 0.6,
      "#6b5c48",
      "#3d3428"
    );
    strokePoly(
      [
        [w * 0.44, h * 0.22],
        [w * 0.48, h * 0.58],
      ],
      "rgba(0,0,0,0.35)",
      2
    );

    fillPolyGrad(
      [
        [w * 0.42, h * 0.48],
        [w * 0.95, h * 0.52],
        [w, h],
        [0, h],
        [0, h * 0.55],
      ],
      w * 0.5,
      h * 0.5,
      w * 0.5,
      h,
      "#3a4d36",
      "#243322"
    );

    drawMarshPatch(w * 0.55, h * 0.66, w * 0.14, h * 0.1);

    fillPolyGrad(
      [
        [w * 0.58, h * 0.02],
        [w * 0.98, h * 0.08],
        [w * 0.92, h * 0.38],
        [w * 0.62, h * 0.32],
      ],
      w * 0.7,
      0,
      w * 0.7,
      h * 0.4,
      "#7a6a54",
      "#3a3228"
    );
    drawMountain(w * 0.78, h * 0.2, h * 0.14, { snow: true, layers: 4 });

    drawRiverPath(
      [
        [0.08, 0.68],
        [0.18, 0.72],
        [0.28, 0.7],
      ],
      w,
      h,
      { width: 0.024 }
    );

    drawRidgeContours(w, h, [
      { pts: [[0.08, 0.32], [0.22, 0.28], [0.35, 0.3], [0.4, 0.38]] },
      { pts: [[0.62, 0.08], [0.75, 0.12], [0.88, 0.18]] },
      { pts: [[0.1, 0.48], [0.25, 0.46], [0.36, 0.5]] },
    ]);
  }

  function drawHebeiTerrain(w, h) {
    const sky = ctx.createLinearGradient(0, 0, 0, h * 0.4);
    sky.addColorStop(0, "#1a1e1c");
    sky.addColorStop(1, "#222820");
    ctx.fillStyle = sky;
    ctx.fillRect(0, 0, w, h);

    fillPolyGrad(
      [
        [0, h * 0.12],
        [w * 0.38, h * 0.05],
        [w * 0.42, h * 0.55],
        [w * 0.08, h * 0.58],
        [0, h * 0.45],
      ],
      0,
      0,
      w * 0.4,
      h * 0.5,
      "#5c5244",
      "#2e2820"
    );
    drawMountain(w * 0.2, h * 0.28, h * 0.1, { layers: 4 });
    drawMountain(w * 0.32, h * 0.22, h * 0.08, {});

    fillPolyGrad(
      [
        [w * 0.35, h * 0.38],
        [w, h * 0.32],
        [w, h],
        [0, h],
        [0, h * 0.58],
      ],
      w * 0.6,
      h * 0.35,
      w * 0.6,
      h,
      "#354a32",
      "#1e281c"
    );

    drawRiverPath(
      [
        [0.12, 0.54],
        [0.35, 0.52],
        [0.52, 0.54],
        [0.72, 0.5],
        [0.9, 0.56],
      ],
      w,
      h,
      { width: 0.032, water: "#3a6d88", mid: "#2d5568" }
    );

    drawRidgeContours(w, h, [
      { pts: [[0.05, 0.18], [0.2, 0.14], [0.32, 0.16]] },
      { pts: [[0.5, 0.4], [0.65, 0.38], [0.8, 0.42]] },
    ]);
  }

  function drawShanxiTerrain(w, h) {
    ctx.fillStyle = "#1e1c18";
    ctx.fillRect(0, 0, w, h);

    fillPolyGrad(
      [
        [0, 0],
        [w * 0.48, 0],
        [w * 0.52, h],
        [0, h],
      ],
      0,
      0,
      w * 0.5,
      h,
      "#5a5040",
      "#2a2620"
    );
    drawMountain(w * 0.22, h * 0.35, h * 0.12, { layers: 4 });
    drawMountain(w * 0.38, h * 0.5, h * 0.07, {});

    fillPolyGrad(
      [
        [w * 0.46, 0],
        [w, 0],
        [w, h],
        [w * 0.5, h],
      ],
      w * 0.7,
      0,
      w * 0.7,
      h,
      "#2e3a2a",
      "#1a2018"
    );

    drawRiverPath(
      [
        [0.42, 0.35],
        [0.48, 0.52],
        [0.55, 0.65],
      ],
      w,
      h,
      { width: 0.026 }
    );

    ctx.fillStyle = "rgba(196, 92, 38, 0.12)";
    ctx.fillRect(w * 0.06, h * 0.42, w * 0.12, h * 0.14);
    ctx.strokeStyle = "rgba(196, 92, 38, 0.35)";
    ctx.strokeRect(w * 0.06, h * 0.42, w * 0.12, h * 0.14);

    drawRidgeContours(w, h, [
      { pts: [[0.1, 0.2], [0.25, 0.25], [0.38, 0.3]] },
      { pts: [[0.55, 0.25], [0.7, 0.28], [0.85, 0.32]] },
    ]);
  }

  function drawWaterTerrain(w, h) {
    const sky = ctx.createLinearGradient(0, 0, 0, h * 0.35);
    sky.addColorStop(0, "#1a2228");
    sky.addColorStop(1, "#243028");
    ctx.fillStyle = sky;
    ctx.fillRect(0, 0, w, h);
    const lake = ctx.createLinearGradient(0, h * 0.25, 0, h);
    lake.addColorStop(0, "#2d5a6e");
    lake.addColorStop(0.5, "#1e4a5c");
    lake.addColorStop(1, "#163a48");
    ctx.fillStyle = lake;
    ctx.fillRect(0, h * 0.22, w, h * 0.78);
    for (let i = 0; i < 5; i++) {
      const y = h * (0.3 + i * 0.12);
      ctx.strokeStyle = `rgba(90, 140, 160, ${0.15 + 0.05 * Math.sin(Date.now() / 700 + i)})`;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(0, y);
      for (let x = 0; x <= w; x += 24) ctx.lineTo(x, y + Math.sin(x / 40 + Date.now() / 1200 + i) * 4);
      ctx.stroke();
    }
    fillPolyGrad(
      [
        [w * 0.08, h * 0.35],
        [w * 0.22, h * 0.28],
        [w * 0.28, h * 0.55],
        [w * 0.1, h * 0.58],
      ],
      w * 0.15,
      h * 0.3,
      w * 0.15,
      h * 0.55,
      "#4a5c3a",
      "#2a3828"
    );
    fillPolyGrad(
      [
        [w * 0.72, h * 0.32],
        [w * 0.92, h * 0.38],
        [w * 0.88, h * 0.62],
        [w * 0.68, h * 0.55],
      ],
      w * 0.8,
      h * 0.35,
      w * 0.8,
      h * 0.6,
      "#3d5034",
      "#243020"
    );
    drawRiverPath(
      [
        [0.35, 0.18],
        [0.55, 0.25],
        [0.75, 0.22],
      ],
      w,
      h,
      { width: 0.02, water: "#4a8aa8" }
    );
  }

  function drawCourtTerrain(w, h) {
    const g = ctx.createLinearGradient(0, 0, w, h);
    g.addColorStop(0, "#1e1a16");
    g.addColorStop(0.5, "#2a241c");
    g.addColorStop(1, "#1a1612");
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, w, h);
    ctx.fillStyle = "rgba(212, 168, 75, 0.06)";
    for (let i = 0; i < 6; i++) {
      ctx.fillRect(w * (0.1 + i * 0.14), h * 0.12, w * 0.02, h * 0.76);
    }
    ctx.strokeStyle = "rgba(212, 168, 75, 0.2)";
    ctx.strokeRect(w * 0.08, h * 0.1, w * 0.84, h * 0.8);
    fillPolyGrad(
      [
        [w * 0.55, h * 0.55],
        [w * 0.95, h * 0.5],
        [w * 0.98, h * 0.95],
        [w * 0.5, h * 0.95],
      ],
      w * 0.7,
      h * 0.5,
      w * 0.7,
      h,
      "#3d4a32",
      "#252a20"
    );
    drawRiverPath(
      [
        [0.62, 0.52],
        [0.78, 0.58],
        [0.9, 0.55],
      ],
      w,
      h,
      { width: 0.018, water: "#3a6a7a" }
    );
    ctx.fillStyle = "rgba(196, 92, 38, 0.15)";
    ctx.beginPath();
    ctx.arc(w * 0.22, h * 0.35, h * 0.08, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = "rgba(212, 168, 75, 0.4)";
    ctx.stroke();
  }

  function drawHexiTerrain(w, h) {
    ctx.fillStyle = "#2a2418";
    ctx.fillRect(0, 0, w, h);
    fillPolyGrad(
      [
        [0, 0],
        [w * 0.55, 0],
        [w * 0.5, h * 0.55],
        [0, h * 0.5],
      ],
      0,
      0,
      w * 0.5,
      h * 0.5,
      "#6b5a42",
      "#3a3228"
    );
    drawMountain(w * 0.18, h * 0.22, h * 0.12, { snow: true, layers: 4 });
    drawMountain(w * 0.35, h * 0.35, h * 0.09, { light: "#7a6a50", shadow: "#2e2820" });
    const desert = ctx.createLinearGradient(w * 0.45, 0, w, h);
    desert.addColorStop(0, "#4a4030");
    desert.addColorStop(0.5, "#5c5040");
    desert.addColorStop(1, "#3a3428");
    ctx.fillStyle = desert;
    ctx.fillRect(w * 0.42, 0, w * 0.58, h);
    drawRiverPath(
      [
        [0.48, 0.35],
        [0.58, 0.5],
        [0.72, 0.62],
      ],
      w,
      h,
      { width: 0.02, water: "#4a6a78" }
    );
    ctx.fillStyle = "rgba(122, 90, 168, 0.12)";
    ctx.fillRect(w * 0.68, h * 0.38, w * 0.22, h * 0.18);
    ctx.strokeStyle = "rgba(122, 90, 168, 0.35)";
    ctx.strokeRect(w * 0.68, h * 0.38, w * 0.22, h * 0.18);
  }

  function drawLiaodongTerrain(w, h) {
    const sky = ctx.createLinearGradient(0, 0, 0, h * 0.3);
    sky.addColorStop(0, "#1a2028");
    sky.addColorStop(1, "#242a30");
    ctx.fillStyle = sky;
    ctx.fillRect(0, 0, w, h);
    fillPolyGrad(
      [
        [0, h * 0.15],
        [w * 0.35, h * 0.05],
        [w * 0.4, h * 0.55],
        [0, h * 0.5],
      ],
      0,
      0,
      w * 0.35,
      h * 0.5,
      "#4a5048",
      "#2a3028"
    );
    drawMountain(w * 0.15, h * 0.2, h * 0.11, { snow: true, layers: 4 });
    fillPolyGrad(
      [
        [w * 0.32, h * 0.4],
        [w, h * 0.35],
        [w, h],
        [w * 0.28, h],
      ],
      w * 0.6,
      h * 0.4,
      w * 0.6,
      h,
      "#2e3a32",
      "#1a2018"
    );
    drawRiverPath(
      [
        [0.4, 0.45],
        [0.55, 0.52],
        [0.7, 0.48],
        [0.85, 0.55],
      ],
      w,
      h,
      { width: 0.028, water: "#3a6a88" }
    );
    ctx.fillStyle = "rgba(212, 168, 75, 0.2)";
    ctx.fillRect(w * 0.72, h * 0.32, w * 0.18, h * 0.14);
    ctx.strokeStyle = "rgba(212, 168, 75, 0.5)";
    ctx.strokeRect(w * 0.72, h * 0.32, w * 0.18, h * 0.14);
    drawRidgeContours(w, h, [
      { pts: [[0.05, 0.12], [0.2, 0.1], [0.32, 0.14]] },
      { pts: [[0.5, 0.28], [0.65, 0.26], [0.8, 0.3]] },
    ]);
  }

  function defaultTerrain(w, h) {
    ctx.save();
    if (cfg.mapStyle === "hebei") drawHebeiTerrain(w, h);
    else if (cfg.mapStyle === "shanxi") drawShanxiTerrain(w, h);
    else if (cfg.mapStyle === "water") drawWaterTerrain(w, h);
    else if (cfg.mapStyle === "court") drawCourtTerrain(w, h);
    else if (cfg.mapStyle === "hexi") drawHexiTerrain(w, h);
    else if (cfg.mapStyle === "liaodong") drawLiaodongTerrain(w, h);
    else drawYaoshanTerrain(w, h);
    drawTerrainLandmarks(w, h);
    ctx.restore();
    if (typeof cfg.drawTerrain === "function") cfg.drawTerrain(ctx, w, h);
  }

  function drawArrow(x1, y1, x2, y2, color, dash, alpha) {
    ctx.save();
    ctx.globalAlpha = alpha ?? 1;
    ctx.strokeStyle = color;
    ctx.fillStyle = color;
    ctx.lineWidth = 2;
    if (dash) ctx.setLineDash([6, 4]);
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.stroke();
    const ang = Math.atan2(y2 - y1, x2 - x1);
    const ah = 10;
    ctx.beginPath();
    ctx.moveTo(x2, y2);
    ctx.lineTo(x2 - ah * Math.cos(ang - 0.4), y2 - ah * Math.sin(ang - 0.4));
    ctx.lineTo(x2 - ah * Math.cos(ang + 0.4), y2 - ah * Math.sin(ang + 0.4));
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  }

  function drawUnit(u, w, h, opts) {
    const alpha = u.alpha ?? 1;
    if (alpha < 0.04) return;
    if (opts.units && u.marchDx != null) drawMarchGhost(u, w, h);
    const scale = u.scale ?? 1;
    const x = u.x * w;
    const y = u.y * h;
    const side = u.side;
    let color = "#888";
    if (side === "song") {
      color =
        u.type === "banner"
          ? "#d4a84b"
          : u.type === "elite"
            ? "#e07b39"
            : u.type === "broken"
              ? "#6b4423"
              : u.type === "dead"
                ? "#444"
                : "#c45c26";
    } else if (side === "jin") {
      color = u.type === "cavalry" ? "#4a8ab0" : u.type === "dead" ? "#333" : "#3d6b8a";
    } else if (side === "xi") color = "#7a5aaa";
    if (u.type === "special") color = "#5a7a9a";

    ctx.save();
    ctx.globalAlpha = alpha;
    if (u.type === "banner" && opts.emperor) {
      ctx.shadowColor = "#d4a84b";
      ctx.shadowBlur = 16 + 8 * Math.sin(Date.now() / 280);
    }
    ctx.fillStyle = color;
    if (u.type === "banner") {
      ctx.beginPath();
      ctx.moveTo(x, y - 14);
      ctx.lineTo(x + 8, y);
      ctx.lineTo(x, y + 4);
      ctx.lineTo(x - 8, y);
      ctx.closePath();
      ctx.fill();
      ctx.fillRect(x - 1, y, 2, 18);
    } else if (u.type === "cavalry" || u.type === "elite") {
      const r = (side === "jin" ? 10 : 9) * scale;
      ctx.beginPath();
      ctx.arc(x, y, r, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = "#fff";
      ctx.lineWidth = 1;
      ctx.stroke();
    } else if (u.type === "fleet") {
      ctx.beginPath();
      ctx.moveTo(x, y - 10 * scale);
      ctx.lineTo(x + 16 * scale, y + 8 * scale);
      ctx.lineTo(x, y + 2 * scale);
      ctx.lineTo(x - 16 * scale, y + 8 * scale);
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = "rgba(255,255,255,0.5)";
      ctx.lineWidth = 1;
      ctx.stroke();
    } else if (u.type === "camp" || u.type === "city") {
      ctx.strokeStyle = color;
      const rw = u.type === "city" ? 28 : 32;
      const rh = u.type === "city" ? 22 : 20;
      ctx.strokeRect(x - rw / 2, y - rh / 2, rw, rh);
      if (u.type === "city") {
        ctx.fillStyle = "rgba(196,92,38,0.25)";
        ctx.fillRect(x - rw / 2, y - rh / 2, rw, rh);
      }
    } else if (u.type === "court") {
      ctx.strokeStyle = color;
      ctx.beginPath();
      ctx.arc(x, y, 11 * scale, 0, Math.PI * 2);
      ctx.stroke();
      ctx.fillStyle = "rgba(212,168,75,0.2)";
      ctx.fill();
    } else {
      ctx.fillRect(x - 12, y - 8, 24, 16);
    }
    ctx.restore();
    if (opts.units && u.label && u.type !== "terrain") {
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.fillStyle = "#e8dcc8";
      ctx.font = "11px sans-serif";
      ctx.textAlign = "center";
      ctx.fillText(u.label, x, y + 22);
      ctx.restore();
    }
  }

  function draw() {
    const w = canvas.clientWidth;
    const h = canvas.clientHeight;
    if (!w || !h) return;
    ctx.clearRect(0, 0, w, h);
    defaultTerrain(w, h);
    const opts = getOpts();
    if (opts.arrows && displayArrows.length) {
      displayArrows.forEach((a) => {
        const col = a.side === "jin" ? "#6eb5d8" : a.side === "xi" ? "#a88bd8" : "#e89550";
        drawArrow(
          a.from[0] * w,
          a.from[1] * h,
          a.to[0] * w,
          a.to[1] * h,
          col,
          a.dash,
          a.alpha
        );
      });
    }
    if (opts.units) displayUnits.forEach((u) => drawUnit(u, w, h, opts));
    if (opts.labels) {
      ctx.font = "12px sans-serif";
      terrain.forEach((t) => {
        const kind = t.kind || terrainKind(t.name || "");
        const x = t.x * w;
        const y = t.y * h;
        const lift = kind === "mountain" ? -14 : kind === "water" ? 10 : kind === "marsh" ? 4 : 0;
        ctx.textAlign = "center";
        ctx.fillStyle = "rgba(232, 220, 200, 0.9)";
        ctx.fillText(t.name, x, y + lift);
        if (kind === "mountain" || kind === "water") {
          ctx.fillStyle = "rgba(212, 168, 75, 0.45)";
          ctx.fillRect(x - 2, y + lift - 14, 4, 4);
        }
      });
    }
  }

  const tagLabels = {
    song: "宋军",
    jin: "金军",
    turn: "转折点",
    xi: "西夏",
    politics: "朝局",
    naval: "水战",
  };

  function updatePanel(p) {
    slider.value = phase;
    document.getElementById("phaseNum").textContent = phase + 1;
    document.getElementById("phaseTotal").textContent = phases.length;
    document.getElementById("phaseTitle").textContent = p.title;
    document.getElementById("phaseTime").textContent = p.time;
    document.getElementById("phaseClock").textContent = p.time;
    document.getElementById("phaseNarrative").textContent = p.narrative;
    document.getElementById("phaseFigures").innerHTML = p.figures;
    const tagsEl = document.getElementById("phaseTags");
    tagsEl.innerHTML = "";
    (p.tags || []).forEach((t) => {
      const span = document.createElement("span");
      span.className = "tag " + t;
      span.textContent = tagLabels[t] || t;
      tagsEl.appendChild(span);
    });
  }

  function snapToPhase(n) {
    phase = n;
    displayUnits = cloneUnits(phases[phase].units);
    displayArrows = [...(phases[phase].arrows || [])];
    updatePanel(phases[phase]);
    cancelAnim();
    draw();
  }

  function goToPhase(target, instant, onDone) {
    target = Math.max(0, Math.min(phases.length - 1, target));
    if (target === phase && !instant) {
      onDone?.();
      return;
    }
    cancelAnim();

    if (instant || !animEnabled()) {
      snapToPhase(target);
      onDone?.();
      return;
    }

    const from = phase;
    const fromU = cloneUnits(phases[from].units);
    const toU = cloneUnits(phases[target].units);
    const fromA = phases[from].arrows || [];
    const toA = phases[target].arrows || [];
    let start = null;
    const token = {};
    transitionToken = token;

    function frame(now) {
      if (transitionToken !== token) return;
      if (!start) start = now;
      const raw = Math.min(1, (now - start) / animDuration);
      const t = easeInOut(raw);
      displayUnits = lerpUnits(fromU, toU, t);
      displayArrows = lerpArrows(fromA, toA, t);
      if (progressBar) progressBar.style.width = raw * 100 + "%";
      draw();
      if (raw < 1) {
        rafId = requestAnimationFrame(frame);
      } else {
        phase = target;
        displayUnits = cloneUnits(phases[phase].units);
        displayArrows = [...(phases[phase].arrows || [])];
        updatePanel(phases[phase]);
        if (progressBar) progressBar.style.width = "0%";
        rafId = null;
        if (transitionToken === token) transitionToken = null;
        draw();
        onDone?.();
      }
    }
    updatePanel(phases[target]);
    rafId = requestAnimationFrame(frame);
  }

  function setPhase(n, instant) {
    goToPhase(n, !!instant);
  }

  function stopAllPlayback() {
    playing = false;
    filmMode = false;
    clearTimeout(playTimer);
    const btnPlay = document.getElementById("btnPlay");
    const btnFilm = document.getElementById("btnFilm");
    if (btnPlay) btnPlay.textContent = "▶ 分步播放";
    if (btnFilm) btnFilm.textContent = "🎬 动画播放";
  }

  function runFilm() {
    if (!filmMode) return;
    if (phase >= phases.length - 1) {
      stopAllPlayback();
      return;
    }
    goToPhase(phase + 1, false, () => {
      if (filmMode) setTimeout(runFilm, holdDuration);
    });
  }

  slider.addEventListener("input", (e) => {
    stopAllPlayback();
    snapToPhase(parseInt(e.target.value, 10));
  });
  document.getElementById("btnPrev").addEventListener("click", () => {
    stopAllPlayback();
    setPhase(phase - 1, false);
  });
  document.getElementById("btnNext").addEventListener("click", () => {
    stopAllPlayback();
    setPhase(phase + 1, false);
  });

  function runStepPlay() {
    if (!playing) return;
    if (phase >= phases.length - 1) {
      stopAllPlayback();
      return;
    }
    goToPhase(phase + 1, false, () => {
      if (playing) playTimer = setTimeout(runStepPlay, holdDuration);
    });
  }

  document.getElementById("btnPlay").addEventListener("click", function () {
    if (playing) {
      stopAllPlayback();
      clearTimeout(playTimer);
      return;
    }
    stopAllPlayback();
    playing = true;
    this.textContent = "⏸ 暂停";
    runStepPlay();
  });

  const btnFilm = document.getElementById("btnFilm");
  if (btnFilm) {
    btnFilm.addEventListener("click", function () {
      if (filmMode) {
        stopAllPlayback();
        return;
      }
      stopAllPlayback();
      filmMode = true;
      this.textContent = "⏹ 停止动画";
      if (phase >= phases.length - 1) snapToPhase(0);
      runFilm();
    });
  }

  ["showLabels", "showUnits", "showArrows", "highlightEmperor", "enableAnim"].forEach((id) => {
    const el = document.getElementById(id);
    if (el) el.addEventListener("change", () => draw());
  });

  function resize() {
    const wrap = canvas.parentElement;
    const dpr = window.devicePixelRatio || 1;
    const w = wrap.clientWidth;
    const h = wrap.clientHeight;
    canvas.width = w * dpr;
    canvas.height = h * dpr;
    canvas.style.width = w + "px";
    canvas.style.height = h + "px";
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    draw();
  }

  window.addEventListener("resize", resize);
  canvas.addEventListener("mousemove", (e) => {
    const rect = canvas.getBoundingClientRect();
    const x = (e.clientX - rect.left) / rect.width;
    const y = (e.clientY - rect.top) / rect.height;
    let hit = null;
    for (const t of terrain) {
      if (Math.hypot(t.x - x, t.y - y) < 0.06) hit = t.name;
    }
    for (const u of displayUnits) {
      if (Math.hypot(u.x - x, u.y - y) < 0.04) {
        const side =
          u.side === "song" ? "（宋）" : u.side === "jin" ? "（金）" : u.side === "xi" ? "（夏）" : "";
        hit = (u.label || "") + side;
      }
    }
    if (hit) {
      tooltip.style.display = "block";
      tooltip.style.left = e.clientX + 12 + "px";
      tooltip.style.top = e.clientY + 12 + "px";
      tooltip.textContent = hit;
    } else tooltip.style.display = "none";
  });
  canvas.addEventListener("mouseleave", () => (tooltip.style.display = "none"));
  document.addEventListener("keydown", (e) => {
    if (e.key === "ArrowLeft") {
      stopAllPlayback();
      setPhase(phase - 1, false);
    }
    if (e.key === "ArrowRight") {
      stopAllPlayback();
      setPhase(phase + 1, false);
    }
    if (e.key === " ") {
      e.preventDefault();
      document.getElementById("btnFilm")?.click() || document.getElementById("btnPlay").click();
    }
  });

  snapToPhase(0);
  resize();
})();

  </script>
</body>
</html>
