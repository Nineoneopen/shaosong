<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>绍宋 · 战役推演</title>
  <style>
:root {
  --bg: #1a1612;
  --panel: #252018;
  --border: #4a3f32;
  --song: #c45c26;
  --song-dim: rgba(196, 92, 38, 0.35);
  --jin: #3d6b8a;
  --jin-dim: rgba(61, 107, 138, 0.4);
  --gold: #d4a84b;
  --text: #e8dcc8;
  --muted: #9a8b76;
  --accent: #8b4513;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: "PingFang SC", "Microsoft YaHei", "Noto Serif SC", "STSong", serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  background-image:
    radial-gradient(ellipse 80% 50% at 50% 0%, rgba(212, 168, 75, 0.08), transparent),
    linear-gradient(180deg, #1a1612 0%, #12100d 100%);
}
header {
  padding: 1rem 1.5rem;
  border-bottom: 1px solid var(--border);
}
header .top-row {
  display: flex;
  flex-wrap: wrap;
  align-items: baseline;
  gap: 0.75rem 1.5rem;
  margin-bottom: 0.5rem;
}
header h1 {
      font-family: "STKaiti", "KaiTi", "PingFang SC", serif;
  font-size: 1.75rem;
  font-weight: 400;
  color: var(--gold);
  letter-spacing: 0.15em;
}
header .sub { color: var(--muted); font-size: 0.9rem; }
.battle-nav {
  display: flex;
  flex-wrap: wrap;
  gap: 6px 10px;
  font-size: 0.8rem;
}
.battle-nav a {
  color: var(--muted);
  text-decoration: none;
  padding: 4px 10px;
  border: 1px solid var(--border);
  border-radius: 4px;
}
.battle-nav a:hover { color: var(--gold); border-color: var(--gold); }
.battle-nav a.active { color: var(--gold); background: rgba(212, 168, 75, 0.12); border-color: var(--gold); }
.layout {
  display: grid;
  grid-template-columns: 1fr 340px;
  grid-template-rows: auto 1fr;
  gap: 0;
  height: calc(100vh - 100px);
}
@media (max-width: 960px) {
  .layout { grid-template-columns: 1fr; grid-template-rows: auto 50vh auto; height: auto; min-height: calc(100vh - 100px); }
}
.map-wrap {
  position: relative;
  background: #14110e;
  border-right: 1px solid var(--border);
  overflow: hidden;
}
.anim-progress {
  position: absolute;
  top: 0;
  left: 0;
  height: 3px;
  width: 0;
  background: linear-gradient(90deg, var(--gold), var(--song));
  transition: width 0.05s linear;
  z-index: 5;
  pointer-events: none;
}
.controls button.film {
  background: #5a3d1a;
  border-color: var(--gold);
}
#map { display: block; width: 100%; height: 100%; cursor: crosshair; }
.map-legend {
  position: absolute;
  bottom: 12px;
  left: 12px;
  background: rgba(37, 32, 24, 0.92);
  border: 1px solid var(--border);
  padding: 10px 14px;
  font-size: 0.75rem;
  border-radius: 4px;
  line-height: 1.6;
}
.map-legend span {
  display: inline-block;
  width: 12px;
  height: 12px;
  margin-right: 6px;
  vertical-align: middle;
  border-radius: 2px;
}
.sidebar {
  display: flex;
  flex-direction: column;
  background: var(--panel);
  border-left: 1px solid var(--border);
  overflow: hidden;
}
@media (max-width: 960px) {
  .sidebar { border-left: none; border-top: 1px solid var(--border); max-height: 50vh; }
}
.phase-nav { padding: 12px 14px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.phase-nav label { font-size: 0.75rem; color: var(--muted); display: block; margin-bottom: 6px; }
.phase-slider { width: 100%; accent-color: var(--gold); }
.phase-meta { display: flex; justify-content: space-between; margin-top: 8px; font-size: 0.8rem; }
.phase-meta strong { color: var(--gold); }
.controls { display: flex; gap: 8px; margin-top: 10px; }
.controls button {
  flex: 1;
  padding: 8px;
  font-family: inherit;
  font-size: 0.85rem;
  background: var(--accent);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 4px;
  cursor: pointer;
}
.controls button:hover { filter: brightness(1.15); }
.controls button.primary { background: #6b4423; border-color: var(--gold); }
.content { flex: 1; overflow-y: auto; padding: 14px 16px; }
.phase-title { font-size: 1.15rem; color: var(--gold); margin-bottom: 8px; font-family: "STKaiti", "KaiTi", serif; }
.phase-time { font-size: 0.8rem; color: var(--muted); margin-bottom: 12px; }
.narrative { font-size: 0.92rem; line-height: 1.75; margin-bottom: 14px; text-align: justify; }
.tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
.tag { font-size: 0.72rem; padding: 3px 8px; border-radius: 3px; border: 1px solid var(--border); }
.tag.song { background: var(--song-dim); color: #f0a070; }
.tag.jin { background: var(--jin-dim); color: #8ec4e0; }
.tag.turn { border-color: var(--gold); color: var(--gold); }
.tag.xi { background: rgba(120, 90, 160, 0.35); color: #c9b0e8; }
.figures { border-top: 1px solid var(--border); padding-top: 12px; }
.figures h4 { font-size: 0.8rem; color: var(--muted); margin-bottom: 8px; font-weight: 400; }
.figure-list { font-size: 0.82rem; line-height: 1.6; color: var(--muted); }
.figure-list b { color: var(--text); font-weight: 600; }
.toolbar {
  grid-column: 1 / -1;
  display: flex;
  flex-wrap: wrap;
  gap: 8px 16px;
  padding: 10px 16px;
  border-top: 1px solid var(--border);
  background: var(--panel);
  font-size: 0.8rem;
  align-items: center;
}
.toolbar label { display: flex; align-items: center; gap: 6px; color: var(--muted); cursor: pointer; }
.toolbar input { accent-color: var(--gold); }
.disclaimer {
  padding: 8px 16px 12px;
  font-size: 0.72rem;
  color: var(--muted);
  border-top: 1px solid var(--border);
  line-height: 1.5;
}
.tooltip {
  position: fixed;
  pointer-events: none;
  background: rgba(20, 17, 14, 0.95);
  border: 1px solid var(--gold);
  padding: 8px 12px;
  font-size: 0.8rem;
  max-width: 220px;
  border-radius: 4px;
  z-index: 100;
  display: none;
}

  </style>

/**
 * 绍宋战役沙盘 — 通用引擎（含阶段过渡动画）
 */
(function () {
  const cfg = window.BATTLE_CONFIG;
  if (!cfg || !cfg.phases?.length) {
    console.error("BATTLE_CONFIG.phases required");
    return;
  }

  document.title = cfg.pageTitle || "绍宋 · 战役推演";
  const h1 = document.getElementById("hdrTitle");
  if (h1 && cfg.headerTitle) h1.textContent = cfg.headerTitle;
  const disc = document.getElementById("disclaimer");
  if (disc && cfg.disclaimer) disc.textContent = cfg.disclaimer;

  const phases = cfg.phases;
  const terrain = cfg.terrain || [];
  const animDuration = cfg.animDuration ?? 1600;
  const holdDuration = cfg.holdDuration ?? 2800;

  let phase = 0;
  let playing = false;
  let playTimer = null;
  let filmMode = false;
  let displayUnits = [];
  let displayArrows = [];
  let rafId = null;

  const canvas = document.getElementById("map");
  const ctx = canvas.getContext("2d");
  const tooltip = document.getElementById("tooltip");
  const slider = document.getElementById("phaseSlider");
  const progressBar = document.getElementById("animProgress");

  slider.min = 0;
  slider.max = phases.length - 1;

  function easeInOut(t) {
    return t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
  }

  function cloneUnits(units) {
    return (units || []).map((u) => ({ ...u }));
  }

  function unitKey(u) {
    return u.id || u.label || `${u.x}-${u.y}`;
  }

  function lerpUnits(from, to, t) {
    const mf = new Map(from.map((u) => [unitKey(u), u]));
    const mt = new Map(to.map((u) => [unitKey(u), u]));
    const keys = new Set([...mf.keys(), ...mt.keys()]);
    const out = [];
    keys.forEach((k) => {
      const a = mf.get(k);
      const b = mt.get(k);
      if (a && b) {
        const dx = b.x - a.x;
        const dy = b.y - a.y;
        out.push({
          ...b,
          x: a.x + dx * t,
          y: a.y + dy * t,
          alpha: 1,
          scale: 1 + 0.18 * Math.sin(t * Math.PI),
          marchDx: dx,
          marchDy: dy,
        });
      } else if (a) out.push({ ...a, alpha: 1 - t });
      else out.push({ ...b, alpha: t });
    });
    return out.filter((u) => (u.alpha ?? 1) > 0.04);
  }

  function lerpArrows(from, to, t) {
    const out = [];
    const max = Math.max((from || []).length, (to || []).length);
    for (let i = 0; i < max; i++) {
      const a = from?.[i];
      const b = to?.[i];
      if (a && b) {
        out.push({
          from: [
            a.from[0] + (b.from[0] - a.from[0]) * t,
            a.from[1] + (b.from[1] - a.from[1]) * t,
          ],
          to: [
            a.to[0] + (b.to[0] - a.to[0]) * t,
            a.to[1] + (b.to[1] - a.to[1]) * t,
          ],
          side: b.side,
          dash: b.dash,
          alpha: 1,
        });
      } else if (a) out.push({ ...a, alpha: 1 - t });
      else if (b) out.push({ ...b, alpha: t });
    }
    return out.filter((a) => a.alpha > 0.04);
  }

  function drawMarchGhost(u, w, h) {
    if (u.marchDx == null) return;
    const x0 = (u.x - u.marchDx * 0.35) * w;
    const y0 = (u.y - u.marchDy * 0.35) * h;
    const x1 = u.x * w;
    const y1 = u.y * h;
    ctx.save();
    ctx.globalAlpha = 0.35;
    ctx.strokeStyle = u.side === "jin" ? "#6eb5d8" : "#e89550";
    ctx.lineWidth = 1.5;
    ctx.setLineDash([4, 4]);
    ctx.beginPath();
    ctx.moveTo(x0, y0);
    ctx.lineTo(x1, y1);
    ctx.stroke();
    ctx.restore();
  }

  function cancelAnim() {
    transitionToken = null;
    if (rafId) cancelAnimationFrame(rafId);
    rafId = null;
    if (progressBar) progressBar.style.width = "0%";
  }

  let transitionToken = null;

  function animEnabled() {
    const el = document.getElementById("enableAnim");
    return !el || el.checked;
  }

  function getOpts() {
    return {
      labels: document.getElementById("showLabels").checked,
      units: document.getElementById("showUnits").checked,
      arrows: document.getElementById("showArrows").checked,
      emperor: document.getElementById("highlightEmperor").checked,
    };
  }

  function defaultTerrain(w, h) {
    ctx.save();
    if (cfg.mapStyle === "hebei") {
      ctx.fillStyle = "#2a3d28";
      ctx.fillRect(0, h * 0.35, w, h * 0.65);
      ctx.fillStyle = "#3a5a6e";
      ctx.globalAlpha = 0.5;
      ctx.beginPath();
      ctx.moveTo(w * 0.15, h * 0.55);
      ctx.lineTo(w * 0.85, h * 0.5);
      ctx.lineTo(w * 0.9, h * 0.7);
      ctx.lineTo(w * 0.1, h * 0.75);
      ctx.closePath();
      ctx.fill();
      ctx.globalAlpha = 1;
      ctx.fillStyle = "#5c4a38";
      ctx.beginPath();
      ctx.moveTo(w * 0.05, h * 0.2);
      ctx.lineTo(w * 0.35, h * 0.15);
      ctx.lineTo(w * 0.4, h * 0.45);
      ctx.lineTo(w * 0.08, h * 0.5);
      ctx.closePath();
      ctx.fill();
    } else if (cfg.mapStyle === "shanxi") {
      ctx.fillStyle = "#3d4a32";
      ctx.fillRect(0, 0, w * 0.45, h);
      ctx.fillStyle = "#4a3d32";
      ctx.beginPath();
      ctx.moveTo(w * 0.42, 0);
      ctx.lineTo(w * 0.55, h * 0.3);
      ctx.lineTo(w * 0.48, h);
      ctx.lineTo(w * 0.35, h * 0.7);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = "#2d4a5a";
      ctx.globalAlpha = 0.45;
      ctx.fillRect(w * 0.5, h * 0.4, w * 0.5, h * 0.25);
      ctx.globalAlpha = 1;
      ctx.fillStyle = "#2a3528";
      ctx.fillRect(w * 0.48, 0, w * 0.52, h);
    } else {
      ctx.fillStyle = "#4a3d32";
      ctx.beginPath();
      ctx.moveTo(w * 0.05, h * 0.42);
      ctx.lineTo(w * 0.42, h * 0.28);
      ctx.lineTo(w * 0.38, h * 0.55);
      ctx.lineTo(w * 0.08, h * 0.5);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = "#2d4a2a";
      ctx.globalAlpha = 0.6;
      ctx.fillRect(0, h * 0.45, w * 0.95, h * 0.55);
      ctx.globalAlpha = 1;
      ctx.fillStyle = "#5c4a38";
      ctx.beginPath();
      ctx.moveTo(w * 0.65, h * 0.05);
      ctx.lineTo(w * 0.95, h * 0.15);
      ctx.lineTo(w * 0.9, h * 0.35);
      ctx.lineTo(w * 0.6, h * 0.32);
      ctx.closePath();
      ctx.fill();
    }
    ctx.restore();
    if (typeof cfg.drawTerrain === "function") cfg.drawTerrain(ctx, w, h);
  }

  function drawArrow(x1, y1, x2, y2, color, dash, alpha) {
    ctx.save();
    ctx.globalAlpha = alpha ?? 1;
    ctx.strokeStyle = color;
    ctx.fillStyle = color;
    ctx.lineWidth = 2;
    if (dash) ctx.setLineDash([6, 4]);
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.stroke();
    const ang = Math.atan2(y2 - y1, x2 - x1);
    const ah = 10;
    ctx.beginPath();
    ctx.moveTo(x2, y2);
    ctx.lineTo(x2 - ah * Math.cos(ang - 0.4), y2 - ah * Math.sin(ang - 0.4));
    ctx.lineTo(x2 - ah * Math.cos(ang + 0.4), y2 - ah * Math.sin(ang + 0.4));
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  }

  function drawUnit(u, w, h, opts) {
    const alpha = u.alpha ?? 1;
    if (alpha < 0.04) return;
    if (opts.units && u.marchDx != null) drawMarchGhost(u, w, h);
    const scale = u.scale ?? 1;
    const x = u.x * w;
    const y = u.y * h;
    const side = u.side;
    let color = "#888";
    if (side === "song") {
      color =
        u.type === "banner"
          ? "#d4a84b"
          : u.type === "elite"
            ? "#e07b39"
            : u.type === "broken"
              ? "#6b4423"
              : u.type === "dead"
                ? "#444"
                : "#c45c26";
    } else if (side === "jin") {
      color = u.type === "cavalry" ? "#4a8ab0" : u.type === "dead" ? "#333" : "#3d6b8a";
    } else if (side === "xi") color = "#7a5aaa";
    if (u.type === "special") color = "#5a7a9a";

    ctx.save();
    ctx.globalAlpha = alpha;
    if (u.type === "banner" && opts.emperor) {
      ctx.shadowColor = "#d4a84b";
      ctx.shadowBlur = 16 + 8 * Math.sin(Date.now() / 280);
    }
    ctx.fillStyle = color;
    if (u.type === "banner") {
      ctx.beginPath();
      ctx.moveTo(x, y - 14);
      ctx.lineTo(x + 8, y);
      ctx.lineTo(x, y + 4);
      ctx.lineTo(x - 8, y);
      ctx.closePath();
      ctx.fill();
      ctx.fillRect(x - 1, y, 2, 18);
    } else if (u.type === "cavalry" || u.type === "elite") {
      const r = (side === "jin" ? 10 : 9) * scale;
      ctx.beginPath();
      ctx.arc(x, y, r, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = "#fff";
      ctx.lineWidth = 1;
      ctx.stroke();
    } else if (u.type === "camp" || u.type === "city") {
      ctx.strokeStyle = color;
      const rw = u.type === "city" ? 28 : 32;
      const rh = u.type === "city" ? 22 : 20;
      ctx.strokeRect(x - rw / 2, y - rh / 2, rw, rh);
      if (u.type === "city") {
        ctx.fillStyle = "rgba(196,92,38,0.25)";
        ctx.fillRect(x - rw / 2, y - rh / 2, rw, rh);
      }
    } else {
      ctx.fillRect(x - 12, y - 8, 24, 16);
    }
    ctx.restore();
    if (opts.units && u.label && u.type !== "terrain") {
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.fillStyle = "#e8dcc8";
      ctx.font = "11px sans-serif";
      ctx.textAlign = "center";
      ctx.fillText(u.label, x, y + 22);
      ctx.restore();
    }
  }

  function draw() {
    const w = canvas.clientWidth;
    const h = canvas.clientHeight;
    if (!w || !h) return;
    ctx.clearRect(0, 0, w, h);
    defaultTerrain(w, h);
    const opts = getOpts();
    if (opts.arrows && displayArrows.length) {
      displayArrows.forEach((a) => {
        const col = a.side === "jin" ? "#6eb5d8" : a.side === "xi" ? "#a88bd8" : "#e89550";
        drawArrow(
          a.from[0] * w,
          a.from[1] * h,
          a.to[0] * w,
          a.to[1] * h,
          col,
          a.dash,
          a.alpha
        );
      });
    }
    if (opts.units) displayUnits.forEach((u) => drawUnit(u, w, h, opts));
    if (opts.labels) {
      ctx.fillStyle = "rgba(232, 220, 200, 0.85)";
      ctx.font = "12px sans-serif";
      terrain.forEach((t) => {
        ctx.textAlign = "center";
        ctx.fillText(t.name, t.x * w, t.y * h);
      });
    }
  }

  const tagLabels = { song: "宋军", jin: "金军", turn: "转折点", xi: "西夏/藩部" };

  function updatePanel(p) {
    slider.value = phase;
    document.getElementById("phaseNum").textContent = phase + 1;
    document.getElementById("phaseTotal").textContent = phases.length;
    document.getElementById("phaseTitle").textContent = p.title;
    document.getElementById("phaseTime").textContent = p.time;
    document.getElementById("phaseClock").textContent = p.time;
    document.getElementById("phaseNarrative").textContent = p.narrative;
    document.getElementById("phaseFigures").innerHTML = p.figures;
    const tagsEl = document.getElementById("phaseTags");
    tagsEl.innerHTML = "";
    (p.tags || []).forEach((t) => {
      const span = document.createElement("span");
      span.className = "tag " + t;
      span.textContent = tagLabels[t] || t;
      tagsEl.appendChild(span);
    });
  }

  function snapToPhase(n) {
    phase = n;
    displayUnits = cloneUnits(phases[phase].units);
    displayArrows = [...(phases[phase].arrows || [])];
    updatePanel(phases[phase]);
    cancelAnim();
    draw();
  }

  function goToPhase(target, instant, onDone) {
    target = Math.max(0, Math.min(phases.length - 1, target));
    if (target === phase && !instant) {
      onDone?.();
      return;
    }
    cancelAnim();

    if (instant || !animEnabled()) {
      snapToPhase(target);
      onDone?.();
      return;
    }

    const from = phase;
    const fromU = cloneUnits(phases[from].units);
    const toU = cloneUnits(phases[target].units);
    const fromA = phases[from].arrows || [];
    const toA = phases[target].arrows || [];
    let start = null;
    const token = {};
    transitionToken = token;

    function frame(now) {
      if (transitionToken !== token) return;
      if (!start) start = now;
      const raw = Math.min(1, (now - start) / animDuration);
      const t = easeInOut(raw);
      displayUnits = lerpUnits(fromU, toU, t);
      displayArrows = lerpArrows(fromA, toA, t);
      if (progressBar) progressBar.style.width = raw * 100 + "%";
      draw();
      if (raw < 1) {
        rafId = requestAnimationFrame(frame);
      } else {
        phase = target;
        displayUnits = cloneUnits(phases[phase].units);
        displayArrows = [...(phases[phase].arrows || [])];
        updatePanel(phases[phase]);
        if (progressBar) progressBar.style.width = "0%";
        rafId = null;
        if (transitionToken === token) transitionToken = null;
        draw();
        onDone?.();
      }
    }
    updatePanel(phases[target]);
    rafId = requestAnimationFrame(frame);
  }

  function setPhase(n, instant) {
    goToPhase(n, !!instant);
  }

  function stopAllPlayback() {
    playing = false;
    filmMode = false;
    clearTimeout(playTimer);
    const btnPlay = document.getElementById("btnPlay");
    const btnFilm = document.getElementById("btnFilm");
    if (btnPlay) btnPlay.textContent = "▶ 分步播放";
    if (btnFilm) btnFilm.textContent = "🎬 动画播放";
  }

  function runFilm() {
    if (!filmMode) return;
    if (phase >= phases.length - 1) {
      stopAllPlayback();
      return;
    }
    goToPhase(phase + 1, false, () => {
      if (filmMode) setTimeout(runFilm, holdDuration);
    });
  }

  slider.addEventListener("input", (e) => {
    stopAllPlayback();
    snapToPhase(parseInt(e.target.value, 10));
  });
  document.getElementById("btnPrev").addEventListener("click", () => {
    stopAllPlayback();
    setPhase(phase - 1, false);
  });
  document.getElementById("btnNext").addEventListener("click", () => {
    stopAllPlayback();
    setPhase(phase + 1, false);
  });

  function runStepPlay() {
    if (!playing) return;
    if (phase >= phases.length - 1) {
      stopAllPlayback();
      return;
    }
    goToPhase(phase + 1, false, () => {
      if (playing) playTimer = setTimeout(runStepPlay, holdDuration);
    });
  }

  document.getElementById("btnPlay").addEventListener("click", function () {
    if (playing) {
      stopAllPlayback();
      clearTimeout(playTimer);
      return;
    }
    stopAllPlayback();
    playing = true;
    this.textContent = "⏸ 暂停";
    runStepPlay();
  });

  const btnFilm = document.getElementById("btnFilm");
  if (btnFilm) {
    btnFilm.addEventListener("click", function () {
      if (filmMode) {
        stopAllPlayback();
        return;
      }
      stopAllPlayback();
      filmMode = true;
      this.textContent = "⏹ 停止动画";
      if (phase >= phases.length - 1) snapToPhase(0);
      runFilm();
    });
  }

  ["showLabels", "showUnits", "showArrows", "highlightEmperor", "enableAnim"].forEach((id) => {
    const el = document.getElementById(id);
    if (el) el.addEventListener("change", () => draw());
  });

  function resize() {
    const wrap = canvas.parentElement;
    const dpr = window.devicePixelRatio || 1;
    const w = wrap.clientWidth;
    const h = wrap.clientHeight;
    canvas.width = w * dpr;
    canvas.height = h * dpr;
    canvas.style.width = w + "px";
    canvas.style.height = h + "px";
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    draw();
  }

  window.addEventListener("resize", resize);
  canvas.addEventListener("mousemove", (e) => {
    const rect = canvas.getBoundingClientRect();
    const x = (e.clientX - rect.left) / rect.width;
    const y = (e.clientY - rect.top) / rect.height;
    let hit = null;
    for (const t of terrain) {
      if (Math.hypot(t.x - x, t.y - y) < 0.06) hit = t.name;
    }
    for (const u of displayUnits) {
      if (Math.hypot(u.x - x, u.y - y) < 0.04) {
        const side =
          u.side === "song" ? "（宋）" : u.side === "jin" ? "（金）" : u.side === "xi" ? "（夏）" : "";
        hit = (u.label || "") + side;
      }
    }
    if (hit) {
      tooltip.style.display = "block";
      tooltip.style.left = e.clientX + 12 + "px";
      tooltip.style.top = e.clientY + 12 + "px";
      tooltip.textContent = hit;
    } else tooltip.style.display = "none";
  });
  canvas.addEventListener("mouseleave", () => (tooltip.style.display = "none"));
  document.addEventListener("keydown", (e) => {
    if (e.key === "ArrowLeft") {
      stopAllPlayback();
      setPhase(phase - 1, false);
    }
    if (e.key === "ArrowRight") {
      stopAllPlayback();
      setPhase(phase + 1, false);
    }
    if (e.key === " ") {
      e.preventDefault();
      document.getElementById("btnFilm")?.click() || document.getElementById("btnPlay").click();
    }
  });

  snapToPhase(0);
  resize();
})();

  </script>
</body>
</html>
